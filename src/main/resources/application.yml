spring:
  datasource:
    url: jdbc:h2:mem:grid07db
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  
  h2:
    console:
      enabled: true
  
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080
  